name: Publish

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MEGADOT_VERSION: 4.5.1-m.11
  MEGADOT_BIN_VERSION: 4.5.1

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache MegaDot
        id: cache-megadot
        uses: actions/cache@v4
        with:
          path: megadot
          key: megadot-${{ env.MEGADOT_VERSION }}-linux-x86_64

      - name: Install MegaDot
        if: steps.cache-megadot.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 -o megadot.zip \
            "https://megadot.megacrit.com/${MEGADOT_VERSION}/megadot-${MEGADOT_VERSION}-linux-x86_64-editor-csharp.zip"
          unzip -q megadot.zip -d megadot
          chmod +x "megadot/MegaDot_v${MEGADOT_BIN_VERSION}-stable_mono_linux.x86_64"

      - name: Set Godot path
        run: |
          echo "GODOT_PATH=$(pwd)/megadot/MegaDot_v${MEGADOT_BIN_VERSION}-stable_mono_linux.x86_64" >> "$GITHUB_ENV"

      - name: Import Godot resources
        run: |
          "$GODOT_PATH" --headless --import || true
          "$GODOT_PATH" --headless --import

      - name: Publish
        run: |
          mkdir -p "${{ github.workspace }}/output/mods"
          dotnet publish MultiplayerRelics.csproj -c Release \
            /p:GodotPath="$GODOT_PATH" \
            /p:ModsPath="${{ github.workspace }}/output/mods/"

      - name: Verify build outputs
        run: |
          out="output/mods/MultiplayerRelics"
          for f in "$out/MultiplayerRelics.dll" "$out/MultiplayerRelics.pck" "$out/MultiplayerRelics.json"; do
            [[ -f "$f" ]] || { echo "Missing: $f"; exit 1; }
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiplayerRelics
          path: output/mods